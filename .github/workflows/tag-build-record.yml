name: Tag RatBot Image With Build Record ID

on:
  workflow_run:
    workflows:
      - Build and Publish RatBot Image
    types:
      - completed
    branches:
      - master

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: tag-build-record-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  tag-build-record:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_repository.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Derive image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Resolve Docker build record ID
        id: build_record
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
          WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          artifacts_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${WORKFLOW_RUN_ID}/artifacts?per_page=100"
          response="$(curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$artifacts_url")"

          build_record_artifact="$(jq -r '
            .artifacts
            | map(select(.name | endswith(".dockerbuild")))
            | sort_by(.created_at)
            | last
            | .name // empty
          ' <<<"$response")"

          if [[ -z "$build_record_artifact" ]]; then
            echo "::warning::No .dockerbuild artifact found for completed run ${WORKFLOW_RUN_ID}; skipping build-record tag."
            echo "id=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          build_record_id="${build_record_artifact##*~}"
          build_record_id="${build_record_id%.dockerbuild}"

          {
            echo "id=${build_record_id}"
            echo "source_tag=sha-${WORKFLOW_HEAD_SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.build_record.outputs.id != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.build_record.outputs.id != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image with Docker build record ID
        if: steps.build_record.outputs.id != ''
        shell: bash
        run: |
          set -euo pipefail

          image_repo="${{ steps.image.outputs.name }}"
          build_record_id="${{ steps.build_record.outputs.id }}"
          source_tag="${{ steps.build_record.outputs.source_tag }}"

          docker buildx imagetools create \
            --tag "${image_repo}:${build_record_id}" \
            "${image_repo}:${source_tag}"

          {
            echo "### Build Record Tag"
            echo "- Source image: \`${image_repo}:${source_tag}\`"
            echo "- Added image tag: \`${image_repo}:${build_record_id}\`"
            echo "- Source run: ${{ github.event.workflow_run.html_url }}"
          } >> "$GITHUB_STEP_SUMMARY"
